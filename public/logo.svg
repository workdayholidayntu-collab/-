<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9FD0DE"/>
      <stop offset="42%"  stop-color="#f0f5e8"/>
      <stop offset="100%" stop-color="#b8d8d0"/>
    </linearGradient>
    <clipPath id="bounds">
      <rect width="100" height="100" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="url(#bg)"/>

  <!-- Horizon wave -->
  <path d="M-2 58 C16 54 28 63 52 57 C76 51 86 61 102 57"
        stroke="#111827" stroke-width="2.4" stroke-linecap="round"
        clip-path="url(#bounds)"/>

  <!-- Stone / oval (left, tilted) -->
  <ellipse cx="46" cy="50" rx="14" ry="22"
           transform="rotate(-14 46 50)"
           stroke="#111827" stroke-width="2.4"
           clip-path="url(#bounds)"/>

  <!-- House arch (right) -->
  <path d="M35 58 C35 45 43 29 52 25 C61 29 69 45 69 58"
        stroke="#111827" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"
        clip-path="url(#bounds)"/>

  <!-- 4-pointed sparkle star -->
  <path d="M52 15 L53.5 19.8 L58.5 21.2 L53.5 22.6 L52 27.4 L50.5 22.6 L45.5 21.2 L50.5 19.8 Z"
        fill="#111827"/>
</svg>
